name: Deploy prod

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  DESKTOP_TAURI_CONFIG: apps/desktop/src-tauri/tauri.conf.json
  AZURE_RELEASE_BASE_URL: https://stplaycountereuw.blob.core.windows.net/releases
  AZURE_STORAGE_CONTAINER: releases

jobs:
  detect-desktop-version:
    name: Detect desktop version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      version_changed: ${{ steps.version.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare desktop version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current="$(node scripts/ci/read-desktop-version.mjs)"
          changed="true"
          before="${{ github.event.before }}"

          if [ "${before}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${before}:${DESKTOP_TAURI_CONFIG}" 2>/dev/null; then
            tmp_previous="$(mktemp)"
            git show "${before}:${DESKTOP_TAURI_CONFIG}" > "${tmp_previous}"
            previous="$(node scripts/ci/read-desktop-version.mjs "${tmp_previous}")"

            if [ "${current}" = "${previous}" ]; then
              changed="false"
            fi
          fi

          echo "current=${current}" >> "${GITHUB_OUTPUT}"
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
          echo "Desktop version: ${current}; changed: ${changed}"

  deploy-api:
    name: Build and deploy API
    runs-on: ubuntu-latest
    environment: production
    needs:
      - detect-desktop-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: |
          pnpm --filter @playcounter/shared build
          pnpm --filter @playcounter/api build

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @playcounter/api db:migrate

      - name: Package API
        run: node scripts/ci/package-api.mjs

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .deploy/api/playcounter-api.zip

  build-desktop-windows:
    name: Build Windows desktop
    runs-on: windows-latest
    needs:
      - detect-desktop-version
      - deploy-api
    if: needs.detect-desktop-version.outputs.version_changed == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check desktop version sync
        run: node scripts/ci/check-desktop-version-sync.mjs

      - name: Build desktop distributables
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        run: |
          pnpm --filter @playcounter/shared build
          corepack pnpm --filter @playcounter/desktop tauri:build:prod

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-bundle
          path: apps/desktop/src-tauri/target/release/bundle

  publish-desktop:
    name: Publish desktop artifacts
    runs-on: ubuntu-latest
    environment: production
    needs:
      - detect-desktop-version
      - build-desktop-windows
    if: needs.detect-desktop-version.outputs.version_changed == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Windows bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-bundle
          path: .deploy/desktop/windows

      - name: Create updater manifest
        run: node scripts/ci/create-tauri-latest-json.mjs ".deploy/desktop/windows" "${{ env.AZURE_RELEASE_BASE_URL }}" .deploy/desktop/latest.json

      - name: Upload desktop artifacts to Azure Blob Storage
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          set -euo pipefail
          container="${AZURE_STORAGE_CONTAINER:-releases}"

          find .deploy/desktop -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.sig' \) -print0 | while IFS= read -r -d '' file; do
            blob_name="$(basename "$file")"
            case "$file" in
              *desktop-macos-x86_64-bundle*) blob_name="macos-x86_64-${blob_name}" ;;
              *desktop-macos-aarch64-bundle*) blob_name="macos-aarch64-${blob_name}" ;;
            esac

            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --account-key "$AZURE_STORAGE_KEY" \
              --container-name "$container" \
              --name "$blob_name" \
              --file "$file" \
              --overwrite true
          done

          az storage blob upload \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --account-key "$AZURE_STORAGE_KEY" \
            --container-name "$container" \
            --name latest.json \
            --file .deploy/desktop/latest.json \
            --content-type application/json \
            --overwrite true

  release-github:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - detect-desktop-version
      - build-desktop-windows
    if: needs.detect-desktop-version.outputs.version_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Windows bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-bundle
          path: .deploy/desktop/windows

      - name: Stage installer and compute checksum
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          exe="$(find .deploy/desktop/windows -type f -name '*-setup.exe' | head -n1)"
          if [ -z "${exe}" ]; then
            echo "No NSIS installer (*-setup.exe) found in bundle artifact" >&2
            exit 1
          fi
          mkdir -p .deploy/release
          name="$(basename "${exe}")"
          cp "${exe}" ".deploy/release/${name}"
          cp "${exe}" ".deploy/release/PlayCounter-Setup.exe"
          sha="$(sha256sum ".deploy/release/${name}" | awk '{print $1}')"
          printf '%s  %s\n' "${sha}" "${name}" > ".deploy/release/${name}.sha256"
          printf '%s  %s\n' "${sha}" "PlayCounter-Setup.exe" > ".deploy/release/PlayCounter-Setup.exe.sha256"
          {
            echo "exe_name=${name}"
            echo "sha=${sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create updater manifest
        run: node scripts/ci/create-tauri-latest-json.mjs ".deploy/desktop/windows" "https://github.com/zntr1/PlayCounter/releases/download/v${{ needs.detect-desktop-version.outputs.version }}" .deploy/release/latest.json

      - name: Scan installer on VirusTotal
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            .deploy/release/*-setup.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-desktop-version.outputs.version }}
          name: PlayCounter v${{ needs.detect-desktop-version.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            .deploy/release/${{ steps.artifact.outputs.exe_name }}
            .deploy/release/${{ steps.artifact.outputs.exe_name }}.sha256
            .deploy/release/PlayCounter-Setup.exe
            .deploy/release/PlayCounter-Setup.exe.sha256
            .deploy/release/latest.json
          body: |
            ## PlayCounter v${{ needs.detect-desktop-version.outputs.version }}

            Tracks real playtime for every game you play — whatever launcher it
            came from — by watching what's running on your PC. Free, open source,
            no account.

            ### Download
            **`${{ steps.artifact.outputs.exe_name }}`** — Windows installer (NSIS).

            ### Verify your download (SHA-256)
            ```
            ${{ steps.artifact.outputs.sha }}
            ```
            Check it locally in PowerShell:
            ```powershell
            Get-FileHash .\${{ steps.artifact.outputs.exe_name }} -Algorithm SHA256
            ```

            ### Independent malware scan
            Scanned on VirusTotal (results by SHA-256):
            https://www.virustotal.com/gui/file/${{ steps.artifact.outputs.sha }}

            ---
            PlayCounter is open source — both the client and the server it talks to live in this repository.
