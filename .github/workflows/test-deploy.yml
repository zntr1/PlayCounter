  publish-desktop:
    name: Publish desktop artifacts
    runs-on: ubuntu-latest
    environment: test
    needs:
      - detect-desktop-version
      - build-desktop-windows
    if: needs.detect-desktop-version.outputs.version_changed == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Windows bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-bundle
          path: .deploy/desktop/windows

      - name: Create updater manifest
        run: node scripts/ci/create-tauri-latest-json.mjs ".deploy/desktop/windows" "${{ env.AZURE_RELEASE_BASE_URL }}" .deploy/desktop/latest.json

      - name: Upload desktop artifacts to Azure Blob Storage
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          set -euo pipefail
          container="${AZURE_STORAGE_CONTAINER:-releases}"

          find .deploy/desktop -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.sig' \) -print0 | while IFS= read -r -d '' file; do
            blob_name="$(basename "$file")"
            case "$file" in
              *desktop-macos-x86_64-bundle*) blob_name="macos-x86_64-${blob_name}" ;;
              *desktop-macos-aarch64-bundle*) blob_name="macos-aarch64-${blob_name}" ;;
            esac

            az storage blob upload \
              --account-name "$AZURE_STORAGE_ACCOUNT" \
              --account-key "$AZURE_STORAGE_KEY" \
              --container-name "$container" \
              --name "$blob_name" \
              --file "$file" \
              --overwrite true
          done

          az storage blob upload \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --account-key "$AZURE_STORAGE_KEY" \
            --container-name "$container" \
            --name latest.json \
            --file .deploy/desktop/latest.json \
            --content-type application/json \
            --overwrite true
