<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayCounter</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #0f1014;
      }

      /* Hide the loader once React populates #root */
      #root:not(:empty) + #initial-loader {
        display: none;
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0f1014;
        color: #e7e9ee;
        font:
          600 24px "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        z-index: 9999;
      }

      #initial-loader img {
        width: 64px;
        height: 64px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .brand {
        margin-bottom: 24px;
        letter-spacing: 1px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .progress-bar-container {
        width: 180px;
        height: 4px;
        background: #2a2e39;
        border-radius: 9999px;
        overflow: hidden;
        position: relative;
      }

      .progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 30%;
        background: rgb(var(--color-accent, 0 98 255));
        border-radius: 9999px;
        animation: loading 1.5s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes loading {
        0% {
          left: -30%;
          width: 30%;
        }
        50% {
          width: 50%;
        }
        100% {
          left: 100%;
          width: 30%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="initial-loader">
      <img src="/icon.png" alt="PlayCounter Icon" />
      <div class="brand">PlayCounter</div>
      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
